<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Enablement Operating Model</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FAFAF8; font-family: 'Courier New', monospace; padding: 24px 20px; }
  h1 { text-align: center; font-weight: 300; letter-spacing: 4px; font-size: 20px; color: #252220; margin-bottom: 4px; cursor: pointer; transition: opacity 0.2s; }
  h1:hover { opacity: 0.7; }
  .subtitle { text-align: center; font-size: 8px; color: #B8B4AE; letter-spacing: 2px; font-family: Georgia, serif; font-style: italic; margin-bottom: 20px; }
  .wrap { display: flex; gap: 24px; max-width: 1080px; margin: 0 auto; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
  .panel { width: 300px; display: flex; flex-direction: column; gap: 10px; padding-top: 10px; }
  .detail { border-radius: 6px; padding: 20px; min-height: 320px; transition: all 0.3s; background: white; border: 1px solid #E8E6E2; }
  .detail-tag { font-size: 7px; letter-spacing: 4px; margin-bottom: 6px; opacity: 0.8; }
  .detail-title { font-size: 18px; letter-spacing: 2px; margin-bottom: 3px; font-weight: 700; }
  .detail-sub { font-size: 9px; font-family: Georgia, serif; margin-bottom: 14px; font-style: italic; }
  .detail-desc { font-size: 10px; font-family: Georgia, serif; line-height: 1.75; color: #5A5856; margin-bottom: 14px; }
  .detail-intro { font-size: 8.5px; color: #7A7670; font-family: Georgia, serif; font-style: italic; margin-bottom: 10px; }
  .detail-bullets { list-style: none; padding: 0; margin: 0; }
  .detail-bullets li { font-size: 9.5px; font-family: 'Courier New', monospace; padding: 5px 0; border-bottom: 1px solid #F0EEE8; letter-spacing: 0.3px; display: flex; gap: 8px; align-items: flex-start; line-height: 1.5; color: #5A5A58; }
  .detail-bullets li:last-child { border-bottom: none; }
  .detail-bullets li::before { content: "\2014"; opacity: 0.4; flex-shrink: 0; font-family: 'Courier New', monospace; }
  .overview-bullets { list-style: none; padding: 0; margin: 0; }
  .overview-bullets li { font-size: 9.5px; font-family: Georgia, serif; padding: 8px 0; border-bottom: 1px solid #ECEAE4; line-height: 1.6; color: #5A5856; }
  .overview-bullets li:last-child { border-bottom: none; }
  .overview-label { font-size: 7px; letter-spacing: 2px; font-family: 'Courier New', monospace; display: block; margin-bottom: 3px; }
  .overview-text { font-size: 9.5px; font-family: Georgia, serif; line-height: 1.6; }
  @keyframes arrowPulse {
    0%   { opacity: 0.7; }
    50%  { opacity: 0.15; }
    100% { opacity: 0.7; }
  }
  .arrow-pulse { animation: arrowPulse 1.8s ease-in-out 4; }
</style>
</head>
<body>
<h1 id="main-title">THE ENABLEMENT OPERATING MODEL</h1>
<p class="subtitle">click the diagram to explore</p>
<div class="wrap">
<svg id="diagram" width="590" height="620" viewBox="0 0 590 620"></svg>
<div class="panel">
  <div class="detail" id="detail-panel"></div>
</div>
</div>

<script>
const CX = 295, CY = 300, OR = 212, GR = 128, IR = 62, NR = 44;

const OVERVIEW = {
  tag: "THE MODEL",
  title: "Overview",
  desc: "Enablement only creates value when it changes seller behavior, improves the buyer experience, and moves revenue. This model is how that happens — systematically, repeatably, and with measurable impact at every stage — informed by data and accelerated by AI.",
  intro: "It operates across three integrated layers:",
  closing: "The result is an enablement function built for effectiveness, efficiency, and scale — and always aligned to the business it serves.",
  layers: [
    { label: "3Ps CORE", text: "Platforms, process, and programs — the operational foundation that keeps enablement aligned to business priorities, where excellence in execution translates directly to business impact." },
    { label: "GOVERNANCE", text: "What separates a team that reacts from one that operates — bringing the rigor and structure that keeps every phase running with consistency and intent." },
    { label: "EXECUTION CYCLE", text: "Eliminates the ad hoc — every initiative moves through a structured motion from intake to proven impact." },
  ]
};

const PHASES = [
  { label:"INTAKE",    sub:"Prioritize & Gate",  color:"#9E3D2C", angle:270,
    bullets:["Formal capture of all inbound and identified requests","Evaluation against business impact and strategic priority","Clear accept / defer / decline decision with rationale","Backlog visibility across the portfolio"] },
  { label:"ANALYZE",   sub:"Needs Analysis",     color:"#A07E18", angle:330,
    bullets:["Performance gap diagnosis and baseline measurement","Measurable outcome definition before any design begins","Stakeholder alignment on scope and success criteria","Project structure defined — milestones, owners, dependencies, timeline"] },
  { label:"DESIGN",    sub:"Solution Design",    color:"#9E5A2A", angle:30,
    bullets:["Modality, content architecture, and delivery approach","Workback plan validated against full scope and resources","Review and approval sequencing locked before build begins","Iterated and refined as development begins"] },
  { label:"DEVELOP",   sub:"Build & Validate",   color:"#2E3E6E", angle:90,
    bullets:["Execution tracked against approved plan and milestones","Review cycles managed with defined owners and deadlines","Every asset signed off before it moves to launch","Quality gated, not assumed"] },
  { label:"IMPLEMENT", sub:"Launch & Reinforce", color:"#52683A", angle:150,
    bullets:["Managers briefed before reps","Program deployed across the right channels to the right audience at the right moment","Launch communications sequenced and delivered","Reinforcement executed and adoption tracked from first touchpoint"] },
  { label:"EVALUATE",  sub:"Measure & Improve",  color:"#6A2238", angle:210,
    bullets:["Training activity connected to behavior change and business outcomes","Retrospective conducted and results shared with stakeholders","Program performance assessed against pre-defined success criteria","Insights on seller behavior and revenue impact fed back into intake to close the loop"] },
];

const GOV_PILLARS = [
  { label:"SYSTEMS", sub:"Tech Stack & Integration Governance", angle:60,
    bullets:["Ensures the stack reflects how reps work — without the sprawl that fragments their experience","Connects enablement tools and data across the revenue tech stack — including AI-driven insights","Governs tool adoption so technology investments deliver ROI","Evaluates emerging technology and AI to keep the stack ahead of business needs"] },
  { label:"CHANGE",  sub:"Adoption, Timing & Change Management Governance", angle:120,
    bullets:["Protects seller bandwidth from change overload","Sequences launches around the revenue calendar — SKOs, QBRs, and key field moments","Ensures managers lead change before reps experience it","Governs the conditions for lasting behavior change — from manager accountability to structured follow-through"] },
  { label:"DATA",    sub:"Measurement, Reporting & Insight Governance", angle:180,
    bullets:["Connects training activity to pipeline, win rate, and retention","Defines what good looks like before a program launches","Gives leadership a clear line of sight from enablement spend to revenue impact","Turns anecdotal feedback into structured program intelligence"] },
  { label:"CONTENT", sub:"Standards, Ownership & Lifecycle Governance", angle:240,
    bullets:["Defines standards for how content is created, reviewed, and retired","Governs how content flows from creation to the field — ensuring the right asset reaches the right rep at the right moment","Ties every asset to a stage, persona, and use case — governed by taxonomy and metadata standards that keep content findable and measurable","Tracks content performance and usage to inform what gets prioritized, updated, or retired"] },
  { label:"PROGRAM", sub:"Portfolio & Prioritization Governance", angle:300,
    bullets:["Aligns enablement investment to revenue priorities","Gates work against business impact, not just demand","Keeps leadership visibility into what's in flight and why","Protects team capacity for strategic over reactive work"] },
];

const THREE_PS = [
  { label:"PLATFORMS", sub:"Technology Layer",
    bullets:["The tools, systems, and integrations that power enablement delivery","Connects learning activity to the systems reps use every day","Evaluated and governed through the SYSTEMS pillar"] },
  { label:"PROCESS", sub:"Operational Rhythm",
    bullets:["The workflows, cadences, and decision frameworks that keep the cycle running","Turns one-off programs into a repeatable, scalable operating model","The engine that connects intake to impact"] },
  { label:"PROGRAMS", sub:"Initiatives & Content Delivery",
    bullets:["The initiatives, curricula, and assets delivered to the field","Scoped, prioritized, and governed through the PROGRAM pillar","Measured against outcomes, not just completion"] },
];

function polar(deg, r) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: CX + r * Math.cos(rad), y: CY + r * Math.sin(rad) };
}
function lighten(hex, f) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return "#"+[r,g,b].map(v=>Math.round(v+(255-v)*f).toString(16).padStart(2,"0")).join("");
}
function normalizedFill(hex, active) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  const f=active?0.60-lum*0.12:0.76-lum*0.08;
  return lighten(hex,Math.min(Math.max(f,0.52),0.86));
}
function svgEl(tag, attrs, text) {
  const e=document.createElementNS("http://www.w3.org/2000/svg",tag);
  for(const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if(text!==undefined) e.textContent=text;
  return e;
}

const svg = document.getElementById("diagram");
const defs = svgEl("defs",{});

const mkr1=svgEl("marker",{id:"arr",markerWidth:"8",markerHeight:"8",refX:"7",refY:"4",orient:"auto"});
mkr1.appendChild(svgEl("path",{d:"M0,0 L0,8 L8,4 z",fill:"#9E3D2C",opacity:"0.75"}));
defs.appendChild(mkr1);
const mkr2=svgEl("marker",{id:"arr2",markerWidth:"7",markerHeight:"7",refX:"6",refY:"3.5",orient:"auto"});
mkr2.appendChild(svgEl("path",{d:"M0,0 L0,7 L7,3.5 z",fill:"#6A2238",opacity:"0.55"}));
defs.appendChild(mkr2);
const mkrFlow=svgEl("marker",{id:"arrFlow",markerWidth:"5",markerHeight:"5",refX:"4",refY:"2.5",orient:"auto"});
mkrFlow.appendChild(svgEl("path",{d:"M0,0 L0,5 L5,2.5 z",fill:"#C4C0B8",opacity:"0.7"}));
defs.appendChild(mkrFlow);

const gR = GR + 13;
const gS = polar(340, gR), gE = polar(20, gR);
defs.appendChild(svgEl("path",{id:"gov-arc", d:"M "+gS.x.toFixed(1)+" "+gS.y.toFixed(1)+" A "+gR+" "+gR+" 0 0 1 "+gE.x.toFixed(1)+" "+gE.y.toFixed(1), fill:"none"}));

const fbR = OR + NR + 42;
const fbS = polar(216, fbR), fbE = polar(266, fbR);
defs.appendChild(svgEl("path",{id:"fb-text-arc", d:"M "+fbS.x.toFixed(1)+" "+fbS.y.toFixed(1)+" A "+fbR+" "+fbR+" 0 0 1 "+fbE.x.toFixed(1)+" "+fbE.y.toFixed(1), fill:"none"}));
svg.appendChild(defs);

svg.appendChild(svgEl("circle",{cx:CX,cy:CY,r:OR-NR-8,fill:"#F6F5F3"}));
svg.appendChild(svgEl("circle",{cx:CX,cy:CY,r:OR,fill:"none",stroke:"#DEDAD4","stroke-width":"1.5"}));
svg.appendChild(svgEl("circle",{cx:CX,cy:CY,r:GR,fill:"none",stroke:"#C4C0B8","stroke-width":"1.5","stroke-dasharray":"5 6"}));
svg.appendChild(svgEl("circle",{cx:CX,cy:CY,r:IR,fill:"none",stroke:"#C0BDB6","stroke-width":"1"}));

const govText=svgEl("text",{"font-size":"7.5","font-family":"'Courier New',monospace","letter-spacing":"4.5","fill":"#3A3830","font-weight":"700","opacity":"0.92"});
const govTP=svgEl("textPath",{"href":"#gov-arc","startOffset":"50%","text-anchor":"middle"});
govTP.textContent="GOVERNANCE";
govText.appendChild(govTP);
svg.appendChild(govText);

PHASES.forEach(p=>{
  const i1=polar(p.angle,IR), o1=polar(p.angle,OR-NR-5);
  svg.appendChild(svgEl("line",{x1:i1.x,y1:i1.y,x2:o1.x,y2:o1.y,stroke:"#ECEAE6","stroke-width":"1"}));
});

PHASES.forEach((p,i)=>{
  const nxt=PHASES[(i+1)%PHASES.length];
  const a2=nxt.angle<=p.angle?nxt.angle+360:nxt.angle;
  const spanDeg = a2 - p.angle;
  const arcStart=polar((p.angle+22)%360,OR);
  const arcEnd=polar((a2-22+360)%360,OR);
  const largeArc=spanDeg>180?1:0;
  svg.appendChild(svgEl("path",{
    d:"M"+arcStart.x.toFixed(1)+" "+arcStart.y.toFixed(1)+" A "+OR+" "+OR+" 0 "+largeArc+" 1 "+arcEnd.x.toFixed(1)+" "+arcEnd.y.toFixed(1),
    fill:"none",stroke:"#C4C0B8","stroke-width":"1.2",opacity:"0.6","marker-end":"url(#arrFlow)"
  }));
});

const tip=polar(270,OR+NR+4), start=polar(270,OR+NR+28);
const arrowLine=svgEl("line",{x1:start.x,y1:start.y,x2:tip.x,y2:tip.y,stroke:"#9E3D2C","stroke-width":"2",opacity:"0.7","marker-end":"url(#arr)"});
arrowLine.setAttribute("class","arrow-pulse");
arrowLine.addEventListener("animationend",()=>{
  arrowLine.classList.remove("arrow-pulse");
  arrowLine.setAttribute("opacity","0.7");
});
svg.appendChild(arrowLine);

const ep=polar(216,OR+NR+32), ip=polar(266,OR+NR+28), cp=polar(241,OR+NR+58);
svg.appendChild(svgEl("path",{
  d:"M"+ep.x.toFixed(1)+" "+ep.y.toFixed(1)+" Q"+cp.x.toFixed(1)+" "+cp.y.toFixed(1)+" "+ip.x.toFixed(1)+" "+ip.y.toFixed(1),
  fill:"none",stroke:"#6A2238","stroke-width":"1.5","stroke-dasharray":"5 4",opacity:"0.5","marker-end":"url(#arr2)"
}));
const fbLabel=svgEl("text",{"font-size":"7","font-family":"'Courier New',monospace","letter-spacing":"1.8","fill":"#6A2238","opacity":"0.6"});
const fbTP=svgEl("textPath",{"href":"#fb-text-arc","startOffset":"50%","text-anchor":"middle"});
fbTP.textContent="CONTINUOUS FEEDBACK LOOP";
fbLabel.appendChild(fbTP);
svg.appendChild(fbLabel);

svg.appendChild(svgEl("circle",{cx:CX,cy:CY,r:IR,fill:"#242220",stroke:"#343230","stroke-width":"1"}));

const phaseNodes=[], govTextEls=[], coreTextEls=[];

function buildBullets(bullets, textColor, borderColor) {
  return bullets.map(b=>"<li style='color:"+textColor+";border-bottom-color:"+borderColor+"'>"+b+"</li>").join("");
}

function showOverview() {
  const panel = document.getElementById("detail-panel");
  panel.style.background = "#FAFAF8";
  panel.style.border = "1px solid #E8E6E2";
  const layerHTML = OVERVIEW.layers.map(l =>
    "<li style='border-bottom-color:#ECEAE4'>" +
    "<div><span class='overview-label' style='color:#9A9690'>"+l.label+"</span>" +
    "<span class='overview-text'>"+l.text+"</span></div></li>"
  ).join("");
  panel.innerHTML =
    "<div class='detail-tag' style='color:#9A9690'>"+OVERVIEW.tag+"</div>" +
    "<div class='detail-title' style='color:#252220;font-size:15px'>"+OVERVIEW.title+"</div>" +
    "<div class='detail-desc'>"+OVERVIEW.desc+"</div>" +
    "<div class='detail-intro'>"+OVERVIEW.intro+"</div>" +
    "<ul class='overview-bullets'>"+layerHTML+"</ul>" +
    "<div style='font-size:9.5px;font-family:Georgia,serif;font-style:italic;color:#7A7670;margin-top:14px;line-height:1.6;border-top:1px solid #ECEAE4;padding-top:12px'>"+OVERVIEW.closing+"</div>";
}

function updateDetail(type, index) {
  const panel = document.getElementById("detail-panel");
  if (type === "phase") {
    const p = PHASES[index];
    panel.style.background = lighten(p.color, 0.91);
    panel.style.border = "1px solid "+p.color+"35";
    panel.innerHTML =
      "<div class='detail-tag' style='color:"+p.color+"'>CYCLE PHASE</div>" +
      "<div class='detail-title' style='color:"+p.color+"'>"+p.label+"</div>" +
      "<div class='detail-sub' style='color:#7A7670'>"+p.sub+"</div>" +
      "<ul class='detail-bullets'>"+buildBullets(p.bullets,"#5A5A58","#F0EEE8")+"</ul>";
  } else if (type === "gov") {
    const g = GOV_PILLARS[index];
    panel.style.background = "#F6F5F3";
    panel.style.border = "1px solid #E0DDD6";
    panel.innerHTML =
      "<div class='detail-tag' style='color:#7A7870'>GOVERNANCE PILLAR</div>" +
      "<div class='detail-title' style='color:#3A3A38'>"+g.label+"</div>" +
      "<div class='detail-sub' style='color:#7A7670'>"+g.sub+"</div>" +
      "<ul class='detail-bullets'>"+buildBullets(g.bullets,"#5A5A58","#ECEAE4")+"</ul>";
  } else {
    const p = THREE_PS[index];
    panel.style.background = "#242220";
    panel.style.border = "1px solid #343230";
    panel.innerHTML =
      "<div class='detail-tag' style='color:#8A8680'>CORE \u2014 3Ps</div>" +
      "<div class='detail-title' style='color:#D8D4CC'>"+p.label+"</div>" +
      "<div class='detail-sub' style='color:#9A9690'>"+p.sub+"</div>" +
      "<ul class='detail-bullets'>"+buildBullets(p.bullets,"#A8A4A0","#3A3836")+"</ul>";
  }
}

function deactivateAll() {
  phaseNodes.forEach((n,i)=>{
    n.halo.setAttribute("opacity","0");
    n.circle.setAttribute("fill",normalizedFill(PHASES[i].color,false));
    n.circle.setAttribute("stroke-width","2");
  });
  govTextEls.forEach(t=>{
    t.setAttribute("opacity","0.75");
    t.setAttribute("fill","#6A6A68");
  });
  coreTextEls.forEach(t=>{
    t.setAttribute("fill","#C0BCB4");
    t.removeAttribute("data-active");
  });
}

// Title click — back to overview
document.getElementById("main-title").addEventListener("click", ()=>{
  deactivateAll();
  showOverview();
});

// 3Ps
[["PLATFORMS",-14],["PROCESS",0],["PROGRAMS",14]].forEach(([l,o],i)=>{
  const g=svgEl("g",{style:"cursor:pointer"});
  const txt=svgEl("text",{x:CX,y:CY+o+3,"text-anchor":"middle",fill:"#C0BCB4","font-size":"8","font-weight":"700","letter-spacing":"1.5","font-family":"'Courier New',monospace",opacity:"1"},l);
  g.appendChild(txt);
  g.addEventListener("mouseenter",()=>{ if(!txt.getAttribute("data-active")) txt.setAttribute("fill","#D8D4CC"); });
  g.addEventListener("mouseleave",()=>{ if(!txt.getAttribute("data-active")) txt.setAttribute("fill","#C0BCB4"); });
  g.addEventListener("click",()=>{
    deactivateAll();
    txt.setAttribute("fill","#E8E4DC");
    txt.setAttribute("data-active","1");
    updateDetail("core",i);
  });
  coreTextEls.push(txt);
  svg.appendChild(g);
});

// Phase nodes
PHASES.forEach((phase,i)=>{
  const pos=polar(phase.angle,OR);
  const g=svgEl("g",{style:"cursor:pointer"});
  const halo=svgEl("circle",{cx:pos.x,cy:pos.y,r:NR+10,fill:lighten(phase.color,0.84),stroke:phase.color,"stroke-width":"1",opacity:"0"});
  const circle=svgEl("circle",{cx:pos.x,cy:pos.y,r:NR,fill:normalizedFill(phase.color,false),stroke:phase.color,"stroke-width":"2"});
  const ls=phase.label==="IMPLEMENT"?"0.8":"1.5";
  const name=svgEl("text",{x:pos.x,y:pos.y-3,"text-anchor":"middle",fill:"#3A3632","font-size":"10","font-weight":"700","letter-spacing":ls,"font-family":"'Courier New',monospace"},phase.label);
  const sub=svgEl("text",{x:pos.x,y:pos.y+13,"text-anchor":"middle",fill:"#4A4A48","font-size":"7.5","font-family":"Georgia,serif"},phase.sub);
  g.addEventListener("mouseenter",()=>{ if(halo.getAttribute("opacity")==="0") halo.setAttribute("opacity","0.15"); });
  g.addEventListener("mouseleave",()=>{ if(halo.getAttribute("opacity")==="0.15") halo.setAttribute("opacity","0"); });
  g.appendChild(halo); g.appendChild(circle); g.appendChild(name); g.appendChild(sub);
  g.addEventListener("click",()=>{
    deactivateAll();
    halo.setAttribute("opacity","0.38");
    circle.setAttribute("fill",normalizedFill(phase.color,true));
    circle.setAttribute("stroke-width","2.5");
    updateDetail("phase",i);
  });
  phaseNodes.push({halo,circle});
  svg.appendChild(g);
});

// Governance pillars
GOV_PILLARS.forEach((pillar,i)=>{
  const pos=polar(pillar.angle,GR);
  const g=svgEl("g",{style:"cursor:pointer"});
  const txt=svgEl("text",{x:pos.x,y:pos.y+3,"text-anchor":"middle","dominant-baseline":"middle",fill:"#6A6A68","font-size":"8","font-weight":"700","letter-spacing":"0.8","font-family":"'Courier New',monospace","opacity":"0.75"},pillar.label);
  g.appendChild(txt);
  g.addEventListener("mouseenter",()=>{ if(txt.getAttribute("opacity")!=="1"){ txt.setAttribute("opacity","0.95"); txt.setAttribute("fill","#4A4A48"); }});
  g.addEventListener("mouseleave",()=>{ if(txt.getAttribute("opacity")!=="1"){ txt.setAttribute("opacity","0.75"); txt.setAttribute("fill","#6A6A68"); }});
  g.addEventListener("click",()=>{
    deactivateAll();
    txt.setAttribute("opacity","1");
    txt.setAttribute("fill","#3A3A38");
    updateDetail("gov",i);
  });
  govTextEls.push(txt);
  svg.appendChild(g);
});

showOverview();
</script>
</body>
</html>
